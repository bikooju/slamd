services:
  postgres:
    image: postgres:15
    container_name: slamd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: slamd_metrics
      POSTGRES_USER: slamd
      POSTGRES_PASSWORD: slamd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  grafana:
    image: grafana/grafana
    container_name: slamd-grafana
    restart: unless-stopped
    ports:
      - "30000:3000"
    depends_on:
      - postgres
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  slamd-server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: server
    container_name: slamd-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "3000:3000"
      - "3001:3001"
      - "3003:3003"
    depends_on:
      - postgres
    volumes:
      - slamd_config_db:/opt/slamd/webapps/slamd/WEB-INF/db
    environment:
      JAVA_OPTS: >-
        -server -Xms512m -Xmx512m
        -Djava.awt.headless=true

  slamd-client:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: client
    restart: unless-stopped
    depends_on:
      - slamd-server

volumes:
  postgres_data:
  grafana_data:
  slamd_config_db: