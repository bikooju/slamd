# SLAMD server address (Docker)
SLAMD_ADDRESS=slamd-server
SLAMD_LISTEN_PORT=3000
SLAMD_MANAGER_PORT=3001
SLAMD_STAT_PORT=3003

# Client identification
CLIENT_ADDRESS=
CLIENT_ID=

# Stats reporting
ENABLE_REAL_TIME_STATS=off
REAL_TIME_REPORT_INTERVAL=5

# Stat persistence
ENABLE_STAT_PERSISTENCE=off
STAT_PERSISTENCE_DIRECTORY=statpersistence
STAT_PERSISTENCE_INTERVAL=300

# Authentication
AUTH_ID=
AUTH_PASS=

# SSL (disabled for Docker internal network)
USE_SSL=off
BLIND_TRUST=on
SSL_KEY_STORE=~/.keystore
SSL_KEY_PASS=changeit
SSL_TRUST_STORE=~/.cacerts
SSL_TRUST_PASS=

# Thread aggregation
AGGREGATE_CLIENT_THREADS=on

# Restricted mode
RESTRICTED_MODE=off

# Custom class loader
DISABLE_CUSTOM_CLASS_LOADER=on

# Client manager
AUTO_CREATE_CLIENTS=0
MAX_CLIENTS=0

# Output settings
VERBOSE_MODE=off
QUIET_MODE=off
LOG_FILE=